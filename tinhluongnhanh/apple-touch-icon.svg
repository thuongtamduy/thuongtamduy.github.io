<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="180" height="180" rx="40" fill="url(#appleGrad)"/>
  
  <!-- Money symbol -->
  <circle cx="90" cy="90" r="55" fill="none" stroke="white" stroke-width="6"/>
  <text x="90" y="115" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="white" text-anchor="middle">đ</text>
  
  <!-- Calculator dots decoration -->
  <g opacity="0.9">
    <circle cx="60" cy="45" r="4" fill="white"/>
    <circle cx="90" cy="45" r="4" fill="white"/>
    <circle cx="120" cy="45" r="4" fill="white"/>
  </g>
  
  <!-- Bottom decoration -->
  <g opacity="0.8">
    <rect x="65" y="130" width="12" height="12" rx="2" fill="white"/>
    <rect x="84" y="130" width="12" height="12" rx="2" fill="white"/>
    <rect x="103" y="130" width="12" height="12" rx="2" fill="white"/>
  </g>
</svg>
